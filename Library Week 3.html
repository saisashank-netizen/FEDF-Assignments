<!DOCTYPE html>
<html>
<body>

<h2>Library Book Management System</h2>
<button onclick="showBooks()">Show Books</button>
<div id="output"></div>

<script>
function showBooks() {
  const books = [
    {name:"The Alchemist", author:"Paulo Coelho", base:350, extras:[40,20]},
    {name:"Brave New World", author:"Aldous Huxley", base:450, extras:[70,30]},
    {name:"To Kill a Mockingbird", author:"Harper Lee", base:550, extras:[80,40]}
  ];

  let result = "";

  books.forEach(b => {
    const final = b.base + b.extras.reduce((a,c)=>a+c,0);

    result += `
      <h3>${b.name}</h3>
      <p>Author: ${b.author}</p>
      <p>Base Price: ${b.base}</p>
      <p>Extras: ${b.extras.join(", ")}</p>
      <p>Final Price: ${final}</p>
      <hr>
    `;
  });

  document.getElementById("output").innerHTML = result;
}
</script>

</body>
</html>
